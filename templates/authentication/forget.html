<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Essentwear | Forgot Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Poppins", sans-serif; }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: linear-gradient(135deg, #ff758c, #ff7eb3);
    }

    .container {
      width: 420px;
      background: #fff;
      border-radius: 15px;
      box-shadow: 0px 6px 25px rgba(0,0,0,0.2);
      padding: 25px;
      text-align: center;
    }

    .header-brand svg { width: 50px; height: 50px; fill: #ff4f81; }
    .header-brand h1 { margin-top: 10px; font-size: 22px; font-weight: 700; color: #333; }

    h2 { margin: 20px 0; color: #333; }
    p { margin-bottom: 15px; font-size: 14px; color: #666; }

    .input-group { margin-bottom: 15px; }
    .input-group input {
      width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px;
      outline: none; transition: 0.3s;
    }
    .input-group input:focus { border-color: #ff7eb3; box-shadow: 0 0 4px rgba(255,126,179,0.6); }

    .btn {
      width: 100%; padding: 12px; border: none;
      background: #ff7eb3; color: white; font-size: 16px;
      border-radius: 8px; cursor: pointer; transition: 0.3s;
    }
    .btn:hover { background: #ff4f81; }
  </style>
</head>
<body>

  <div class="container">
    <div class="header-brand">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
        <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4H6zm0 4h12v2H6V6zm2 6a1 1 0 110-2 1 1 0 010 2zm8 0a1 1 0 110-2 1 1 0 010 2z"/>
      </svg>
      <h1>Essentwear</h1>
    </div>

    <h2>Reset Password</h2>
    <p>Enter your email address and we’ll send you reset instructions.</p>

    <form>
      <div class="input-group">
        <input type="email" placeholder="Enter your email" required>
      </div>
      <button type="submit" class="btn">Send Reset Link</button>
    </form>
  </div>

</body>
</html>
