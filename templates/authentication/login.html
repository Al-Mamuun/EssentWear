<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Essentwear | Sign In</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background: linear-gradient(to right, #6a11cb, #2575fc);
    }

    .container {
      width: 400px;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0px 6px 20px rgba(0,0,0,0.15);
      padding: 30px;
    }

    .logo {
      text-align: center;
      margin-bottom: 20px;
    }

    .logo h2 {
      font-size: 28px;
      font-weight: bold;
      color: #2575fc;
    }

    .tabs {
      display: flex;
      justify-content: space-between;
      margin-bottom: 20px;
      border: 1px solid #ddd;
      border-radius: 8px;
      overflow: hidden;
    }

    .tabs button {
      flex: 1;
      padding: 12px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      background: #f8f8f8;
      cursor: pointer;
      transition: 0.3s;
    }

    .tabs button.active {
      background: #2575fc;
      color: #fff;
    }

    form {
      display: none;
    }

    form.active {
      display: block;
    }

    .input-group {
      margin-bottom: 15px;
    }

    .input-group label {
      display: block;
      margin-bottom: 5px;
      font-size: 14px;
      color: #444;
    }

    .input-group input {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      outline: none;
      transition: 0.3s;
    }

    .input-group input:focus {
      border-color: #2575fc;
    }

    .btn {
      width: 100%;
      padding: 12px;
      border: none;
      border-radius: 8px;
      background: #2575fc;
      color: white;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      background: #1a5ed1;
    }

    .extra-links {
      text-align: center;
      margin-top: 10px;
    }

    .extra-links a {
      color: #2575fc;
      text-decoration: none;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <h2>Essentwear</h2>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button id="userTab" class="active">User Sign In</button>
      <button id="sellerTab">Seller Sign In</button>
    </div>

    <!-- User Login -->
    <form id="userForm" class="active" action="/user_signin/" method="post">
      <div class="input-group">
        <label>Email</label>
        <input type="email" placeholder="Enter your email" required>
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" placeholder="Enter your password" required>
      </div>
      <button type="submit" class="btn">Login as User</button>
      <div class="extra-links">
        <a href="#">Forgot Password?</a>
      </div>
    </form>

    <!-- Seller Login -->
    <form id="sellerForm" action="/seller_signin/" method="post">
      <div class="input-group">
        <label>Email</label>
        <input type="email" placeholder="Enter seller email" required>
      </div>
      <div class="input-group">
        <label>Password</label>
        <input type="password" placeholder="Enter seller password" required>
      </div>
      <button type="submit" class="btn">Login as Seller</button>
      <div class="extra-links">
        <a href="#">Forgot Password?</a>
      </div>
    </form>
  </div>

  <script>
    const userTab = document.getElementById("userTab");
    const sellerTab = document.getElementById("sellerTab");
    const userForm = document.getElementById("userForm");
    const sellerForm = document.getElementById("sellerForm");

    userTab.addEventListener("click", () => {
      userTab.classList.add("active");
      sellerTab.classList.remove("active");
      userForm.classList.add("active");
      sellerForm.classList.remove("active");
    });

    sellerTab.addEventListener("click", () => {
      sellerTab.classList.add("active");
      userTab.classList.remove("active");
      sellerForm.classList.add("active");
      userForm.classList.remove("active");
    });
  </script>
</body>
</html>
